name: Check ESPHome API Version

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 06:00 UTC
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - build/add_action_to_auto_update_esphome

env:
  CARGO_TERM_COLOR: always
  PROTOC_VERSION: '3.25.3'

permissions:
  contents: write
  pull-requests: write

jobs:
  check-api-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest ESPHome releases and check for new API versions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Fetch the 5 most recent releases from esphome/esphome (sorted by published date descending)
          RELEASES=$(gh api repos/esphome/esphome/releases --jq 'sort_by(.published_at) | reverse | .[0:5] | .[].tag_name')

          for TAG in $RELEASES; do
            echo "Checking release $TAG..."

            # Download api_connection.cpp for this release
            CPP_URL="https://raw.githubusercontent.com/esphome/esphome/${TAG}/esphome/components/api/api_connection.cpp"
            if ! CPP_CONTENT=$(curl -sf "$CPP_URL"); then
              echo "  Could not fetch api_connection.cpp for $TAG, skipping."
              continue
            fi

            # Extract api_version_major and api_version_minor
            MAJOR=$(echo "$CPP_CONTENT" | grep -oP 'resp\.api_version_major\s*=\s*\K\d+' | head -1)
            MINOR=$(echo "$CPP_CONTENT" | grep -oP 'resp\.api_version_minor\s*=\s*\K\d+' | head -1)

            if [[ -z "$MAJOR" || -z "$MINOR" ]]; then
              echo "  Could not extract API version from $TAG, skipping."
              continue
            fi

            VERSION="${MAJOR}.${MINOR}"
            VERSION_DIR="api_${MAJOR}_${MINOR}"
            VERSION_FEATURE="api-${MAJOR}-${MINOR}"
            echo "  Found API version: $VERSION"

            # Check if this version directory already exists
            if [[ -d "src/proto/${VERSION_DIR}" ]]; then
              echo "  Directory src/proto/${VERSION_DIR} already exists, skipping."
              continue
            fi

            # Check if a PR for this version already exists
            EXISTING_PR=$(gh pr list --search "feat: add ESPHome API proto version ${VERSION}" --state open --json number --jq 'length')
            if [[ "$EXISTING_PR" -gt 0 ]]; then
              echo "  Open PR for version ${VERSION} already exists, skipping."
              continue
            fi

            echo "  New API version ${VERSION} found in release ${TAG}! Creating PR..."

            # Download the proto files from the same release tag
            PROTO_URL="https://raw.githubusercontent.com/esphome/esphome/${TAG}/esphome/components/api/api.proto"
            OPTIONS_URL="https://raw.githubusercontent.com/esphome/esphome/${TAG}/esphome/components/api/api_options.proto"

            API_PROTO=$(curl -sf "$PROTO_URL") || { echo "  Failed to download api.proto"; continue; }
            API_OPTIONS=$(curl -sf "$OPTIONS_URL") || { echo "  Failed to download api_options.proto"; continue; }

            # Create the new version directory and write proto files
            mkdir -p "src/proto/${VERSION_DIR}"
            echo "$API_PROTO" > "src/proto/${VERSION_DIR}/api.proto"
            echo "$API_OPTIONS" > "src/proto/${VERSION_DIR}/api_options.proto"

            # Set outputs for the PR creation step
            echo "new_version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version_dir=${VERSION_DIR}" >> "$GITHUB_OUTPUT"
            echo "version_feature=${VERSION_FEATURE}" >> "$GITHUB_OUTPUT" 
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"

            # Only process the first new version found
            break
          done

      - name: Register new version feature
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.new_version }}
          VERSION_DIR: ${{ steps.check.outputs.version_dir }}
          VERSION_FEATURE: ${{ steps.check.outputs.version_feature }}
          RELEASE_TAG: ${{ steps.check.outputs.release_tag }}
        run: |
          set -euo pipefail

          # Update Cargo.toml to add the new feature
          sed -i "s|^# Esphome API versions.\n$|# Esphome API versions.\n\n# Use api released with ESPHome ${RELEASE_TAG}\n${VERSION_FEATURE} = []|" Cargo.toml

          # Update README.md to include the new version in the list of supported versions
          sed -i "s|^<!-- API_VERSIONS -->$|<!-- API_VERSIONS -->\n- ${VERSION} (\`${VERSION_FEATURE}\`) [(${RELEASE_TAG})](https://github.com/esphome/esphome/blob/${RELEASE_TAG}/esphome/components/api/api.proto)|" README.md


      - name: Install Rust toolchain
        if: steps.check.outputs.found == 'true'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: install protoc
        if: steps.check.outputs.found == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - name: Run proto builder to generate Rust code for the new version
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.new_version }}
          VERSION_DIR: ${{ steps.check.outputs.version_dir }}
          VERSION_FEATURE: ${{ steps.check.outputs.version_feature }}
          RELEASE_TAG: ${{ steps.check.outputs.release_tag }}
        run: |
          set -euo pipefail

          # Cargo run in esphome-client-proto-builder to generate Rust code for the new proto files
          cargo run --manifest-path esphome-client-proto-builder/Cargo.toml

      - name: Create Pull Request
        if: steps.check.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.check.outputs.new_version }}
          VERSION_DIR: ${{ steps.check.outputs.version_dir }}
          VERSION_FEATURE: ${{ steps.check.outputs.version_feature }}
          RELEASE_TAG: ${{ steps.check.outputs.release_tag }}
        run: |
          set -euo pipefail

          BRANCH="feat/api-version-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "src/proto/${VERSION_DIR}/" "src/proto/api.rs" Cargo.toml README.md
          git commit -m "feat: add ESPHome API proto version ${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "feat: add ESPHome API proto version ${VERSION}" \
            --body "New ESPHome API proto version **${VERSION}** detected in release [\`${RELEASE_TAG}\`](https://github.com/esphome/esphome/releases/tag/${RELEASE_TAG}).

          This PR adds support for API version ${VERSION}:
          - Proto files in \`src/proto/${VERSION_DIR}/\`
          - Generated Rust code via proto builder
          - Feature flag \`${VERSION_FEATURE}\` in \`Cargo.toml\`
          - Updated version list in \`README.md\`" \
            --base main \
            --head "$BRANCH"
